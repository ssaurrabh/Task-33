<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thala 7 Product Display</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="container">
        <header>
            <nav id="navbar">
                <h1><a href="#">Thala<span>7.</span></a></h1>
                <div class="menu">
                    <ul>
                        <li><a href="#">Home</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Brands</a></li>
                        <li><a href="#">More</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </div>
                <div class="search">
                    <input type="search">
                    <button>CartView</button>
                    <div class="image">
                        <img src="images/new cropped.jpg" alt="User1">
                    </div>
                </div>
            </nav>
        </header>
        <section class="main">
            <div class="main-box">
                <div class="img">
                    <img src="images/mainimage.jpg" alt="image">
                </div>
                <div class="content">
                    <h3 class="head">Sneakers by Thala7! <br>with Perfect Grip and Color Block</h3>
                    <p>High Quality sneakers with extreme comfort and agility</p>
                    <div class="sideways">
                        <h3><i class="fa-solid fa-indian-rupee-sign"></i>4,500</h3>
                        <div class="spec">
                            <p class="green">Save Upto 40%</p>
                            <p>Inclusive of all Taxes</p>
                        </div>
                    </div>
                    <div class="buttons">
                        <button>2<i class="fa-solid fa-caret-down"></i></button>
                        <button class="bg">ADD TO CART</button>
                    </div>
                </div>
            </div>
        </section>
        <footer>
            <div class="foot">
                <img src="images/mainimage.jpg" alt="mainimg">
                <img src="images/mainimg1.jpg" alt="img1">
                <img src="images/mainimg2.jpg" alt="img2">
                <img src="images/mainimg3.jpg" alt="img3">
            </div>
        </footer>
    </div>
</body>

</html>
